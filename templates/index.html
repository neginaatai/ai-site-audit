<!DOCTYPE html>
<html>
<head>
    <title>AI Site Audit</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 10px; font-size: 16px; margin: 10px 0; }
        button { background: #000; color: white; padding: 12px 24px; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background: #333; }
    </style>
</head>
<body>
    <h1>AI Site Audit Generator</h1>
    <p>Enter a website URL to generate an AI-powered audit report.</p>
    <form method="POST">
        <input type="text" name="url" placeholder="https://example.com" required>
        <button type="submit">Generate Audit</button>
    </form>
</body>
</html>
