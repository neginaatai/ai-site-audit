<!DOCTYPE html>
<html>
<head>
    <title>Audit Report</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        pre { background: #f4f4f4; padding: 20px; white-space: pre-wrap; line-height: 1.6; }
        a { color: #000; }
        button { background: #000; color: white; padding: 10px 20px; border: none; cursor: pointer; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Site Audit Report</h1>
    <p><strong>URL:</strong> {{ url }}</p>
    <pre>{{ audit }}</pre>
    <button onclick="window.print()">Download / Print PDF</button>
    <br>
    <a href="/">← Run another audit</a>
</body>
</html>
